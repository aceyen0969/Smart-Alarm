<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Alarm - Set & Track Alarms</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#667eea" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1><i class="fas fa-bell"></i> Smart Alarm</h1>
        <p>Set alarms and get notifications instantly!</p>
      </header>

      <div class="main-content">
        <!-- Add Alarm Form -->
        <section class="form-section">
          <h2><i class="fas fa-plus"></i> Add New Alarm</h2>
          <form id="alarmForm">
            <div class="form-group">
              <label for="alarmTitle">Alarm Title</label>
              <input
                type="text"
                id="alarmTitle"
                required
                placeholder="e.g., Meeting, Birthday"
              />
            </div>
            <div class="form-group">
              <label for="alarmDate">Date</label>
              <input type="date" id="alarmDate" required />
            </div>
            <div class="form-group">
              <label for="alarmTime">Time</label>
              <input type="time" id="alarmTime" required />
            </div>
            <div class="form-group">
              <label for="notificationBefore">Notify Before (minutes)</label>
              <select id="notificationBefore">
                <option value="5">5 minutes</option>
                <option value="15">15 minutes</option>
                <option value="30">30 minutes</option>
                <option value="60" selected>1 hour</option>
              </select>
            </div>
            <button type="submit" class="btn-primary">
              <i class="fas fa-save"></i> Save Alarm
            </button>
          </form>
        </section>

        <!-- Alarms List -->
        <section class="alarms-section">
          <h2>
            <i class="fas fa-list"></i> Your Alarms (<span id="alarmCount"
              >0</span
            >)
          </h2>
          <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="today">Today</button>
            <button class="filter-btn" data-filter="upcoming">Upcoming</button>
            <button class="filter-btn" data-filter="past">Past</button>
          </div>
          <div id="alarmsList" class="alarms-list">
            <!-- Alarms will be loaded here -->
          </div>
        </section>
      </div>

      <!-- Notifications -->
      <div id="notificationContainer"></div>

      <!-- Delete Confirmation Modal -->
      <div id="deleteModal" class="modal">
        <div class="modal-content">
          <h3>Confirm Delete</h3>
          <p>Are you sure you want to delete this alarm?</p>
          <div class="modal-buttons">
            <button id="confirmDelete" class="btn-danger">Delete</button>
            <button id="cancelDelete" class="btn-secondary">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
